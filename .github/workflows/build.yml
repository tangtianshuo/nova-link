name: Build Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - windows
          - macos

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    if: github.event_name == 'workflow_dispatch' && (inputs.platform == 'all' || inputs.platform == 'windows') || github.event_name == 'push'
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install npm dependencies
        run: npm ci

      # 缓存 Vite 构建产物
      - name: Cache Vite
        uses: actions/cache@v4
        with:
          path: node_modules/.vite
          key: ${{ runner.os }}-vite-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-vite-

      - name: Build Tauri app (MSI + app)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Nova Link ${{ github.ref_name }}"
          releaseBody: |
            ## Download

            Download the installer for your platform:

            ### Windows
            - **MSI Installer** (推荐): Nova Link_x.x.x_x64.msi - 支持选择安装路径
            - **Portable**: Nova Link_x.x.x_x64.exe

            ### macOS
            - **Intel**: Nova Link_x.x.x_x64.dmg
            - **Apple Silicon**: Nova Link_x.x.x_aarch64.dmg
            - **Universal**: Nova Link_x.x.x_universal.dmg
          releaseDraft: false
          prerelease: false
          args: "--bundles msi,app"

  build-macos:
    if: github.event_name == 'workflow_dispatch' && (inputs.platform == 'all' || inputs.platform == 'macos') || github.event_name == 'push'
    permissions:
      contents: write
    runs-on: macos-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: "x86_64-apple-darwin,aarch64-apple-darwin"

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install npm dependencies
        run: npm ci

      # 缓存 Vite 构建产物
      - name: Cache Vite
        uses: actions/cache@v4
        with:
          path: node_modules/.vite
          key: ${{ runner.os }}-vite-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-vite-

      - name: Build macOS app (${{ matrix.target }})
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Nova Link ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          args: "--target ${{ matrix.target }} --bundles app,dmg"

  publish-latest-json:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.platform == 'all')
    needs: [build-windows, build-macos]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Generate latest.json from release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          api="https://api.github.com/repos/${REPO}/releases/tags/${TAG_NAME}"
          release_json="$(curl -sSL -H "Authorization: Bearer ${GITHUB_TOKEN}" -H "X-GitHub-Api-Version: 2022-11-28" "${api}")"

          version="${TAG_NAME#v}"
          pub_date="$(echo "${release_json}" | jq -r '.published_at // .created_at')"
          body="$(echo "${release_json}" | jq -r '.body // ""')"

          asset_url() {
            local name="$1"
            echo "${release_json}" | jq -r --arg n "${name}" '.assets[] | select(.name == $n) | .browser_download_url' | head -n 1
          }

          sig_content() {
            local url="$1"
            curl -sSL -H "Authorization: Bearer ${GITHUB_TOKEN}" "${url}"
          }

          win_sig_name="$(echo "${release_json}" | jq -r '.assets[].name' | grep -E '\.msi\.sig$' | head -n 1 || true)"
          win_sig_url=""
          win_url=""
          win_sig=""
          if [ -n "${win_sig_name}" ]; then
            win_sig_url="$(asset_url "${win_sig_name}")"
            win_url="$(asset_url "${win_sig_name%.sig}")"
            win_sig="$(sig_content "${win_sig_url}")"
          fi

          mac_sig_names="$(echo "${release_json}" | jq -r '.assets[].name' | grep -E '\.app\.tar\.gz\.sig$' || true)"
          mac_x64_sig_name="$(echo "${mac_sig_names}" | grep -E '(x64|x86_64|intel)' | head -n 1 || true)"
          mac_arm_sig_name="$(echo "${mac_sig_names}" | grep -E '(aarch64|arm64)' | head -n 1 || true)"
          mac_universal_sig_name=""
          if [ -z "${mac_x64_sig_name}" ] && [ -z "${mac_arm_sig_name}" ]; then
            mac_universal_sig_name="$(echo "${mac_sig_names}" | head -n 1 || true)"
          fi

          mac_x64_url=""
          mac_x64_sig=""
          if [ -n "${mac_x64_sig_name}" ]; then
            mac_x64_sig_url="$(asset_url "${mac_x64_sig_name}")"
            mac_x64_url="$(asset_url "${mac_x64_sig_name%.sig}")"
            mac_x64_sig="$(sig_content "${mac_x64_sig_url}")"
          fi

          mac_arm_url=""
          mac_arm_sig=""
          if [ -n "${mac_arm_sig_name}" ]; then
            mac_arm_sig_url="$(asset_url "${mac_arm_sig_name}")"
            mac_arm_url="$(asset_url "${mac_arm_sig_name%.sig}")"
            mac_arm_sig="$(sig_content "${mac_arm_sig_url}")"
          elif [ -n "${mac_universal_sig_name}" ]; then
            mac_arm_sig_url="$(asset_url "${mac_universal_sig_name}")"
            mac_arm_url="$(asset_url "${mac_universal_sig_name%.sig}")"
            mac_arm_sig="$(sig_content "${mac_arm_sig_url}")"
          fi

          platforms='{}'
          if [ -n "${win_url}" ] && [ -n "${win_sig}" ]; then
            platforms="$(echo "${platforms}" | jq --arg url "${win_url}" --arg sig "${win_sig}" '. + {"windows-x86_64": {"url": $url, "signature": $sig}}')"
          fi
          if [ -n "${mac_x64_url}" ] && [ -n "${mac_x64_sig}" ]; then
            platforms="$(echo "${platforms}" | jq --arg url "${mac_x64_url}" --arg sig "${mac_x64_sig}" '. + {"darwin-x86_64": {"url": $url, "signature": $sig}}')"
          fi
          if [ -n "${mac_arm_url}" ] && [ -n "${mac_arm_sig}" ]; then
            platforms="$(echo "${platforms}" | jq --arg url "${mac_arm_url}" --arg sig "${mac_arm_sig}" '. + {"darwin-aarch64": {"url": $url, "signature": $sig}}')"
          elif [ -n "${mac_universal_sig_name}" ] && [ -n "${mac_arm_url}" ] && [ -n "${mac_arm_sig}" ]; then
            # Universal binary can be used for both x86_64 and aarch64
            platforms="$(echo "${platforms}" | jq --arg url "${mac_arm_url}" --arg sig "${mac_arm_sig}" '. + {"darwin-aarch64": {"url": $url, "signature": $sig}}')"
            platforms="$(echo "${platforms}" | jq --arg url "${mac_arm_url}" --arg sig "${mac_arm_sig}" '. + {"darwin-x86_64": {"url": $url, "signature": $sig}}')"
          fi

          echo '{}' \
            | jq --arg v "${version}" --arg d "${pub_date}" --arg b "${body}" --argjson p "${platforms}" \
              '{version: $v, pub_date: $d, notes: $b, platforms: $p}' \
            > latest.json

          gh release upload "${TAG_NAME}" latest.json --clobber --repo "${REPO}"
