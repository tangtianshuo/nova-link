name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target platform'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - windows
          - macos

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    if: github.event_name == 'workflow_dispatch' && (inputs.platform == 'all' || inputs.platform == 'windows') || github.event_name == 'push'
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app (MSI)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Nova Link ${{ github.ref_name }}'
          releaseBody: |
            ## Download

            Download the installer for your platform:

            ### Windows
            - **MSI Installer** (推荐): Nova Link_x.x.x_x64.msi - 支持选择安装路径
            - **Portable**: Nova Link_x.x.x_x64.exe

            ### macOS
            - **Intel**: Nova Link_x.x.x_x64.dmg
            - **Apple Silicon**: Nova Link_x.x.x_aarch64.dmg
            - **Universal**: Nova Link_x.x.x_universal.dmg
          releaseDraft: false
          prerelease: false
          args: '--bundles msi'

  build-macos:
    if: github.event_name == 'workflow_dispatch' && (inputs.platform == 'all' || inputs.platform == 'macos') || github.event_name == 'push'
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: 'x86_64-apple-darwin,aarch64-apple-darwin'

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm ci

      - name: Build Intel macOS app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}-x86
          releaseName: 'Nova Link ${{ github.ref_name }} (Intel)'
          releaseBody: |
            ### macOS Intel (x86_64)
            Nova Link_x.x.x_x64.dmg
          releaseDraft: false
          prerelease: false
          args: '--bundles dmg --target x86_64-apple-darwin'

      - name: Build Apple Silicon macOS app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}-arm
          releaseName: 'Nova Link ${{ github.ref_name }} (Apple Silicon)'
          releaseBody: |
            ### macOS Apple Silicon (aarch64)
            Nova Link_x.x.x_aarch64.dmg
          releaseDraft: false
          prerelease: false
          args: '--bundles dmg --target aarch64-apple-darwin'
